apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: api
  selector:
    app: api
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-java: "true"
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: zot.lan:5000/wordsmith-api:latest
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms2048m -Xmx4096m"
            - name: OTEL_JAVA_SDK_MEMORY_MODE
              value: "low_memory"
            - name: OTEL_JAVAAGENT_EXTENSIONS_ENABLED
              value: "false"
          resources:
            requests:
              memory: "2Gi"
              cpu: "100m"
            limits:
              memory: "5Gi"
              cpu: "500m"