apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: api
  selector:
    app: api
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: otel-agent-init
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
          command: ["cp", "/autoinstrumentation.jar", "/otel/javaagent.jar"]
          volumeMounts:
            - mountPath: /otel
              name: otel-agent
      containers:
        - name: api
          image: zot.lan:5000/wordsmith-api:latest
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel/javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: "wordsmith-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-agent-opentelemetry-collector.otel.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
      volumes:
        - name: otel-agent
          emptyDir: {}